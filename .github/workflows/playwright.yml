name: AI Eval Tests

on:
  workflow_dispatch:

jobs:
  run-ai-evals:
    runs-on: ubuntu-latest
    environment: ai-evals

    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - name: Run evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run evals